<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumos 옵션</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <h1>Lumos 설정</h1>
      <p class="description">쇼핑 상세 이미지 대체 텍스트 생성 동작을 설정합니다.</p>

      <label class="setting">
        <input id="enabled" type="checkbox" />
        <span>익스텐션 사용</span>
      </label>

      <label class="setting">
        <input id="autoAnalyze" type="checkbox" />
        <span>자동 분석 사용</span>
      </label>

      <div class="field">
        <label class="fieldLabel" for="apiBaseUrl">API Base URL</label>
        <input
          id="apiBaseUrl"
          class="textInput"
          type="url"
          inputmode="url"
          placeholder="https://api.example.com"
        />
        <p class="hint">비워두면 빌드 시 기본 URL을 사용하고, 없으면 mock으로 동작합니다.</p>
      </div>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
